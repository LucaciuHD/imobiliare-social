<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLU Imobiliare — Social Media Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD700;
    --yellow-dim: rgba(255,215,0,0.10);
    --yellow-border: rgba(255,215,0,0.25);
    --bg: #111111;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text-dim: #666666;
    --text-mid: #999999;
    --green: #00c851;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding-bottom:80px;
  }
  header {
    padding:0 32px; height:68px;
    display:flex; align-items:center; gap:16px;
    border-bottom:2px solid var(--yellow);
    position:sticky; top:0; z-index:100;
    background:#111111;
  }
  .logo-img { height:38px; width:auto; object-fit:contain; }
  .header-divider { width:1px; height:28px; background:rgba(255,215,0,0.3); }
  .header-subtitle {
    font-size:11px; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--text-dim); font-weight:500;
  }
  .status-pill {
    margin-left:auto;
    display:flex; align-items:center; gap:7px;
    background:rgba(0,200,81,0.08);
    border:1px solid rgba(0,200,81,0.25);
    border-radius:20px; padding:5px 14px;
    font-size:11px; color:var(--green); letter-spacing:0.05em; font-weight:600;
  }
  .status-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--green);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  main { max-width:1160px; margin:0 auto; padding:36px 24px; }
  .section-label {
    font-size:10px; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--yellow);
    font-weight:700; margin-bottom:14px;
    display:flex; align-items:center; gap:12px;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(to right, var(--yellow-border), transparent);
  }
  .search-section { margin-bottom:32px; }
  .search-bar {
    display:flex; gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; padding:8px 8px 8px 18px;
    transition:border-color 0.2s;
  }
  .search-bar:focus-within { border-color:var(--yellow-border); }
  .search-input {
    flex:1; background:transparent; border:none; outline:none;
    font-family:'Inter',sans-serif; font-size:14px; color:var(--text); font-weight:400;
  }
  .search-input::placeholder { color:var(--text-dim); }
  .btn-primary {
    background:var(--yellow);
    color:#111; border:none; border-radius:8px;
    padding:11px 26px; font-family:'Inter',sans-serif;
    font-weight:700; font-size:13px; cursor:pointer;
    white-space:nowrap; transition:all 0.2s; letter-spacing:0.02em;
  }
  .btn-primary:hover { background:#ffe033; transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,215,0,0.25); }
  .btn-primary:disabled { background:var(--bg3); color:var(--text-dim); cursor:not-allowed; transform:none; box-shadow:none; }
  .error-msg {
    background:rgba(255,60,60,0.06); border:1px solid rgba(255,60,60,0.2);
    color:#ff6b6b; border-radius:8px; padding:11px 16px;
    font-size:13px; margin-top:12px; display:none; font-weight:500;
  }
  .props-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:14px; margin:14px 0 24px;
  }
  .prop-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; cursor:pointer;
    transition:all 0.2s;
    animation:fadeUp 0.35s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .prop-card:hover { border-color:var(--yellow-border); transform:translateY(-2px); box-shadow:0 12px 32px rgba(0,0,0,0.5); }
  .prop-card.selected { border-color:var(--yellow); box-shadow:0 0 0 1px var(--yellow),0 8px 24px rgba(255,215,0,0.12); }
  .prop-img {
    height:140px; background:var(--bg3); position:relative;
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:11px;
  }
  .prop-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s ease; }
  .prop-card:hover .prop-img img { transform:scale(1.04); }
  .prop-img-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
    pointer-events:none;
  }
  .check-badge {
    position:absolute; top:8px; right:8px;
    width:24px; height:24px; background:var(--yellow);
    border-radius:50%; display:none; align-items:center; justify-content:center;
    font-size:11px; color:#111; font-weight:800;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
    animation:popIn 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .prop-card.selected .check-badge { display:flex; }
  .prop-info { padding:12px 14px 14px; }
  .prop-id {
    display:inline-block; font-size:9px; letter-spacing:0.15em;
    text-transform:uppercase; color:#111;
    background:var(--yellow); border-radius:3px;
    padding:2px 6px; margin-bottom:6px; font-weight:800;
  }
  .prop-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
  .prop-badge {
    font-size:10px; color:var(--text-dim);
    background:var(--bg3); border-radius:3px; padding:2px 6px; letter-spacing:0.03em; font-weight:500;
  }
  .prop-badge.sale { color:#7eb8f7; background:rgba(126,184,247,0.08); }
  .prop-badge.rent { color:#f7a07e; background:rgba(247,160,126,0.08); }
  .prop-title {
    font-weight:500; font-size:12px; line-height:1.5;
    margin-bottom:7px; color:var(--text);
    overflow:hidden; display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .prop-price {
    font-size:15px; font-weight:800; color:var(--yellow); letter-spacing:0.01em;
  }
  .prop-meta { font-size:11px; color:var(--text-dim); margin-top:3px; font-weight:400; }
  .pagination {
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin-bottom:24px;
  }
  .page-btn {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text-mid); border-radius:8px; padding:8px 18px;
    cursor:pointer; font-family:'Inter',sans-serif; font-size:13px;
    transition:all 0.2s; font-weight:500;
  }
  .page-btn:hover:not(:disabled) { border-color:var(--yellow-border); color:var(--yellow); }
  .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .page-info { font-size:13px; color:var(--text-dim); min-width:120px; text-align:center; }
  .generate-wrap { text-align:center; margin:8px 0 32px; }
  .btn-generate {
    background:var(--yellow);
    color:#111; border:none;
    border-radius:10px; padding:16px 52px;
    font-family:'Inter',sans-serif; font-size:16px; font-weight:800;
    cursor:pointer; letter-spacing:0.02em; transition:all 0.2s;
    position:relative; overflow:hidden;
  }
  .btn-generate::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.2) 50%,transparent 70%);
    transform:translateX(-100%); transition:transform 0.5s;
  }
  .btn-generate:hover::before { transform:translateX(100%); }
  .btn-generate:hover { background:#ffe033; transform:translateY(-2px); box-shadow:0 10px 28px rgba(255,215,0,0.3); }
  .btn-generate:disabled { background:var(--bg3); color:var(--text-dim); cursor:not-allowed; transform:none; box-shadow:none; }
  .selected-info { font-size:12px; color:var(--text-dim); margin-top:10px; font-weight:500; }
  .divider {
    border:none; border-top:1px solid var(--border);
    margin:36px 0; position:relative;
  }
  .divider::after {
    content:'▲'; position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    background:var(--bg); padding:0 14px;
    color:var(--yellow); font-size:10px;
  }
  .tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .tab-btn {
    padding:9px 18px; border-radius:8px;
    border:1px solid var(--border); background:transparent;
    color:var(--text-dim); font-size:13px; font-family:'Inter',sans-serif;
    cursor:pointer; display:flex; align-items:center; gap:6px;
    transition:all 0.18s; font-weight:600;
  }
  .tab-btn:hover { border-color:var(--yellow-border); color:var(--text); }
  .post-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:28px; position:relative;
    min-height:140px; display:none; animation:fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .post-box.visible { display:block; }
  .post-box-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border);
  }
  .post-platform-label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); font-weight:700; }
  .copy-btn {
    background:var(--bg3); border:1px solid var(--border);
    color:var(--text-dim); border-radius:7px; padding:7px 14px;
    font-size:12px; font-family:'Inter',sans-serif;
    cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:5px; font-weight:600;
  }
  .copy-btn:hover { color:var(--yellow); border-color:var(--yellow-border); background:var(--yellow-dim); }
  .copy-btn.copied { color:var(--green); border-color:rgba(0,200,81,0.3); background:rgba(0,200,81,0.06); }
  .post-text { font-size:14px; line-height:1.9; white-space:pre-wrap; color:#dddddd; font-weight:400; }
  .empty-state { text-align:center; padding:80px 20px; color:var(--text-dim); }
  .empty-icon {
    width:72px; height:72px; margin:0 auto 20px;
    border:2px solid var(--yellow-border); border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; background:var(--surface);
  }
  .empty-state p { font-size:14px; line-height:1.9; font-weight:400; }
  .spinner {
    display:inline-block; width:13px; height:13px;
    border:2px solid rgba(255,215,0,0.2); border-top-color:var(--yellow);
    border-radius:50%; animation:spin 0.6s linear infinite;
    vertical-align:middle; margin-right:7px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  #propertiesSection { display:none; }
  #postsSection { display:none; }
  .publish-btn {
    background:var(--yellow);
    color:#111; border:none; border-radius:7px;
    padding:7px 14px; font-size:12px; font-family:'Inter',sans-serif;
    cursor:pointer; font-weight:700; transition:all 0.2s; letter-spacing:0.02em;
  }
  .publish-btn:hover:not(:disabled) { background:#ffe033; box-shadow:0 3px 12px rgba(255,215,0,0.25); }
  .publish-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .publish-status { margin-top:10px; font-size:13px; padding:8px 12px; border-radius:7px; display:none; font-weight:500; }
  .publish-status.success { background:rgba(0,200,81,0.08); border:1px solid rgba(0,200,81,0.2); color:var(--green); display:block; }
  .publish-status.error { background:rgba(255,60,60,0.06); border:1px solid rgba(255,60,60,0.2); color:#ff6b6b; display:block; }
</style>
</head>
<body>

<header>
  <!-- Logo SVG — S cu acoperiș integrat, galben pe negru -->
  <svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Acoperis (^) -->
    <polyline points="4,20 18,5 32,20" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S -->
    <path d="M28,26 C28,23 25.5,21 18,21 C10.5,21 8,23 8,26 C8,29 10.5,30.5 18,31.5 C25.5,32.5 28,34 28,37 C28,40 25,42 18,42 C11,42 8,40 8,37"
      stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </svg>
  <div style="display:flex;flex-direction:column;line-height:1.2;margin-left:4px">
    <span style="font-weight:900;font-size:14px;letter-spacing:0.1em;color:#FFD700">SIMPLU</span>
    <span style="font-weight:700;font-size:11px;letter-spacing:0.12em;color:#ffffff">IMOBILIARE</span>
  </div>
  <div class="header-divider"></div>
  <div class="header-subtitle">Social Media Generator</div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<main>
  <div class="search-section">
    <div class="section-label">Caută Proprietăți</div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Caută după titlu, adresă sau cod CP..." onkeyup="handleSearch(event)">
      <button class="btn-primary" id="loadBtn" onclick="loadProperties(1)">Încarcă Proprietăți</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div id="propertiesSection">
    <div class="section-label" id="propLabel">Selectează Proprietatea</div>
    <div class="props-grid" id="propsGrid"></div>
    <div class="pagination" id="pagination"></div>
    <div class="generate-wrap">
      <button class="btn-generate" id="generateBtn" onclick="generateAllPosts()" disabled>▲ Generează Postări Social Media</button>
      <div class="selected-info" id="selectedInfo"></div>
    </div>
  </div>

  <div id="postsSection">
    <div class="divider"></div>
    <div class="section-label">Postări Generate</div>
    <div class="tabs">
      <button class="tab-btn" id="tab-facebook" onclick="showTab('facebook')" style="background:#1877f2;color:#fff;border-color:transparent">📘 Facebook</button>
      <button class="tab-btn" id="tab-instagram" onclick="showTab('instagram')">📸 Instagram</button>
      <button class="tab-btn" id="tab-tiktok" onclick="showTab('tiktok')">🎵 TikTok</button>
      <button class="tab-btn" id="tab-whatsapp" onclick="showTab('whatsapp')">💬 WhatsApp</button>
    </div>
    <div class="post-box visible" id="box-facebook">
      <div class="post-box-header">
        <span class="post-platform-label">📘 Facebook</span>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:12px;color:#999;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500">
            <input type="checkbox" id="overlay-toggle-facebook" checked style="cursor:pointer;accent-color:#FFD700"> 🏷️ Etichete poze
          </label>
          <button class="copy-btn" onclick="copyPost('facebook',this)">📋 Copiază</button>
          <button class="publish-btn" id="pub-facebook" onclick="publishPost('facebook',this)">🚀 Publică pe Facebook</button>
        </div>
      </div>
      <div class="post-text" id="text-facebook"></div>
      <div class="publish-status" id="status-facebook"></div>
    </div>
    <div class="post-box" id="box-instagram">
      <div class="post-box-header">
        <span class="post-platform-label">📸 Instagram</span>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:12px;color:#999;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500">
            <input type="checkbox" id="overlay-toggle-instagram" checked style="cursor:pointer;accent-color:#FFD700"> 🏷️ Etichete poze
          </label>
          <button class="copy-btn" onclick="copyPost('instagram',this)">📋 Copiază</button>
          <button class="publish-btn" id="pub-instagram" onclick="publishPost('instagram',this)">🚀 Publică pe Instagram</button>
        </div>
      </div>
      <div class="post-text" id="text-instagram"></div>
      <div class="publish-status" id="status-instagram"></div>
    </div>
    <div class="post-box" id="box-tiktok">
      <div class="post-box-header"><span class="post-platform-label">🎵 TikTok</span><button class="copy-btn" onclick="copyPost('tiktok',this)">📋 Copiază</button></div>
      <div class="post-text" id="text-tiktok"></div>
    </div>
    <div class="post-box" id="box-whatsapp">
      <div class="post-box-header"><span class="post-platform-label">💬 WhatsApp</span><button class="copy-btn" onclick="copyPost('whatsapp',this)">📋 Copiază</button></div>
      <div class="post-text" id="text-whatsapp"></div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🏠</div>
    <p>Apasă „Încarcă Proprietăți" pentru a vedea<br>proprietățile active din CRM-ul tău.</p>
  </div>
</main>

<script>
const PLATFORMS = ['facebook','instagram','tiktok','whatsapp'];
const TAB_COLORS = {facebook:'#1877f2',instagram:'#e1306c',tiktok:'#ff0050',whatsapp:'#25d366'};
let selectedProp = null, currentPage = 1, totalPages = 1, searchQuery = '';

let searchTimer = null;
function handleSearch(e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value; loadProperties(1); }, 400);
}

async function loadProperties(page) {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Se încarcă...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  try {
    let url = `/api/properties?page=${page}`;
    if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Eroare server: ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const props = data.results || [];
    if (!props.length) throw new Error('Nu s-au găsit proprietăți.');
    currentPage = page;
    totalPages = Math.ceil((data.count || props.length) / 20);
    renderProps(props, data.count);
    renderPagination(data.count);
    document.getElementById('propertiesSection').style.display = 'block';
  } catch(e) {
    showError(e.message);
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 Reîncarcă';
  }
}

function renderProps(props, total) {
  document.getElementById('propLabel').textContent = `Selectează Proprietatea — ${total || props.length} active, pagina ${currentPage}/${totalPages}`;
  document.getElementById('propsGrid').innerHTML = props.map((p, i) => {
    const price = p.price_sale ? Number(p.price_sale).toLocaleString('ro-RO')+' EUR'
                : p.price_rent ? Number(p.price_rent).toLocaleString('ro-RO')+' EUR/lună' : 'Preț la cerere';
    const type = p.property_type === 1 && p.apartment_type
      ? {1:'Garsonieră',2:'2 camere',3:'3 camere',4:'4+ camere'}[p.apartment_type] || 'Apartament'
      : {1:'Apartament',2:'Casă',3:'Teren',4:'Comercial',5:'Birou',6:'Depozit',7:'Hotel'}[p.property_type] || 'Proprietate';
    const meta = [p.surface_useful&&p.surface_useful+' mp', p.rooms&&p.rooms+' cam.', p.floor!=null&&'et.'+p.floor].filter(Boolean).join(' · ');
    const sel = selectedProp?.id === p.id ? 'selected' : '';
    const propJson = encodeURIComponent(JSON.stringify(p));
    const txBadge = p.transaction_type === 2 ? '<span class="prop-badge rent">Închiriere</span>' : '<span class="prop-badge sale">Vânzare</span>';
    return `<div class="prop-card ${sel}" id="card-${p.id}" onclick="selectProp(this,'${propJson}')" style="animation-delay:${i*0.04}s">
      <div class="prop-img" id="img-${p.id}">
        <span>📷 Se încarcă...</span>
        <div class="prop-img-overlay"></div>
        <div class="check-badge">✓</div>
      </div>
      <div class="prop-info">
        <div class="prop-id">${p.display_id||'CP'+p.id}</div>
        <div class="prop-badges">${txBadge}<span class="prop-badge">${type}</span></div>
        <div class="prop-title">${p.title||p.street||'Proprietate'}</div>
        <div class="prop-price">${price}</div>
        <div class="prop-meta">${meta}</div>
      </div>
    </div>`;
  }).join('');
  props.forEach(p => loadCardImage(p.id));
}

async function loadCardImage(propId) {
  try {
    const res = await fetch(`/api/properties/${propId}/images`);
    if (!res.ok) return;
    const images = await res.json();
    const imgEl = document.getElementById(`img-${propId}`);
    if (!imgEl) return;
    const firstImg = Array.isArray(images) ? images[0] : images?.results?.[0];
    if (firstImg?.url) {
      const check = imgEl.querySelector('.check-badge');
      const overlay = imgEl.querySelector('.prop-img-overlay');
      imgEl.innerHTML = `<img src="${firstImg.url}" alt="" style="width:100%;height:100%;object-fit:cover">`;
      if (overlay) imgEl.appendChild(overlay);
      if (check) imgEl.appendChild(check);
    } else {
      const span = imgEl.querySelector('span');
      if (span) span.textContent = '📷 Fără imagine';
    }
  } catch {}
}

function renderPagination(total) {
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  document.getElementById('pagination').innerHTML = `
    <button class="page-btn" onclick="loadProperties(${currentPage-1})" ${currentPage<=1?'disabled':''}>← Anterior</button>
    <span class="page-info">Pagina ${currentPage} din ${totalPages}</span>
    <button class="page-btn" onclick="loadProperties(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>Următor →</button>
  `;
}

function selectProp(el, propJson) {
  document.querySelectorAll('.prop-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedProp = JSON.parse(decodeURIComponent(propJson));
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('selectedInfo').textContent = '▲ Selectat: ' + (selectedProp.display_id||'') + ' — ' + (selectedProp.title||selectedProp.street||'');
  document.getElementById('postsSection').style.display = 'none';
}

async function generateAllPosts() {
  if (!selectedProp) return;
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Se generează...';
  document.getElementById('postsSection').style.display = 'block';
  PLATFORMS.forEach(p => { document.getElementById('text-'+p).textContent = '⏳ Se generează...'; });
  document.getElementById('postsSection').scrollIntoView({behavior:'smooth'});
  await Promise.all(PLATFORMS.map(platform => generatePost(platform)));
  btn.disabled = false;
  btn.innerHTML = '▲ Regenerează Postări';
}

async function generatePost(platform) {
  const el = document.getElementById('text-'+platform);
  el.textContent = '';
  try {
    const res = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ property: selectedProp, platform })
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n').filter(l => l.startsWith('data: '))) {
        try {
          const json = JSON.parse(line.slice(6));
          if (json.text) el.textContent += json.text;
          if (json.error) el.textContent = '⚠️ ' + json.error;
        } catch {}
      }
    }
  } catch(e) { el.textContent = '⚠️ Eroare: ' + e.message; }
}

function showTab(id) {
  PLATFORMS.forEach(p => {
    document.getElementById('box-'+p).classList.remove('visible');
    const t = document.getElementById('tab-'+p);
    t.style.background = 'transparent';
    t.style.color = '#666666';
    t.style.borderColor = 'rgba(255,255,255,0.08)';
  });
  document.getElementById('box-'+id).classList.add('visible');
  const t = document.getElementById('tab-'+id);
  t.style.background = TAB_COLORS[id];
  t.style.color = '#fff';
  t.style.borderColor = 'transparent';
}

async function copyPost(id, btn) {
  await navigator.clipboard.writeText(document.getElementById('text-'+id).textContent);
  btn.innerHTML = '✓ Copiat!';
  btn.classList.add('copied');
  setTimeout(() => { btn.innerHTML = '📋 Copiază'; btn.classList.remove('copied'); }, 2000);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

async function publishPost(platform, btn) {
  const text = document.getElementById('text-' + platform).textContent;
  const statusEl = document.getElementById('status-' + platform);
  if (!text || text.startsWith('⏳') || text.startsWith('⚠️')) return;

  btn.disabled = true;
  statusEl.className = 'publish-status';

  let imageUrls = [];
  if (selectedProp) {
    try {
      const imgRes = await fetch(`/api/properties/${selectedProp.id}/images`);
      const images = await imgRes.json();
      const list = Array.isArray(images) ? images : (images?.results || []);
      imageUrls = list.slice(0, 6).map(img => img.url).filter(Boolean);
    } catch {}
  }
  const originalImageUrls = [...imageUrls];

  let batchId = null;
  const useOverlays = document.getElementById('overlay-toggle-' + platform)?.checked !== false;
  if (imageUrls.length > 0 && useOverlays) {
    btn.textContent = '🎨 Se procesează pozele...';
    statusEl.textContent = '🎨 Se adaugă etichete pe poze...';
    try {
      const ovRes = await fetch('/api/overlay-images', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageUrls, property: selectedProp })
      });
      const ovData = await ovRes.json();
      if (ovData.overlayUrls) {
        imageUrls = ovData.overlayUrls;
        batchId = ovData.batchId;
      }
    } catch {}
  }

  btn.textContent = '⏳ Se publică...';
  try {
    const res = await fetch(`/api/publish/${platform}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, imageUrls, batchId, fallbackUrls: originalImageUrls })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const photoCount = imageUrls.length > 0 ? ` (${imageUrls.length} poze)` : '';
    statusEl.textContent = '✅ Publicat cu succes' + photoCount + '! ID: ' + data.id;
    statusEl.className = 'publish-status success';
    btn.textContent = '✅ Publicat!';
    setTimeout(() => { btn.textContent = '🚀 Publică pe ' + (platform === 'facebook' ? 'Facebook' : 'Instagram'); btn.disabled = false; }, 3000);
  } catch(e) {
    statusEl.textContent = '❌ Eroare: ' + e.message;
    statusEl.className = 'publish-status error';
    btn.textContent = '🚀 Publică pe ' + (platform === 'facebook' ? 'Facebook' : 'Instagram');
    btn.disabled = false;
  }
}
</script>
